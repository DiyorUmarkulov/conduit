name: E2E

on:
  pull_request:
  workflow_dispatch:

jobs:
  e2e-core:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Run e2e (in-memory)
        run: pnpm e2e

  e2e-brokers:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Run e2e (broker stack)
        env:
          CONDUIT_E2E_BROKER_BATCH: "100"
          CONDUIT_E2E_BROKER_CONSUME_TIMEOUT_MS: "20000"
          CONDUIT_E2E_BROKER_BATCH_TIMEOUT_MS: "60000"
        run: pnpm e2e:brokers
