<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Conduit">
  <!-- CORE -->
  <circle cx="90" cy="90" r="8" fill="#A78BFA"/>

  <!-- INNER RING -->
  <circle cx="90" cy="40" r="4" fill="#4F46E5"/>
  <circle cx="140" cy="90" r="4" fill="#6366F1"/>
  <circle cx="90" cy="140" r="4" fill="#4F46E5"/>
  <circle cx="40" cy="90" r="4" fill="#6366F1"/>

  <!-- OUTER RING -->
  <circle cx="40" cy="40" r="3" fill="#8B5CF6"/>
  <circle cx="140" cy="40" r="3" fill="#8B5CF6"/>
  <circle cx="140" cy="140" r="3" fill="#8B5CF6"/>
  <circle cx="40" cy="140" r="3" fill="#8B5CF6"/>

  <!-- CORE FLOWS -->
  <line x1="90" y1="90" x2="90" y2="40" stroke="#4F46E5" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="90" y1="90" x2="140" y2="90" stroke="#6366F1" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="90" y1="90" x2="90" y2="140" stroke="#4F46E5" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="90" y1="90" x2="40" y2="90" stroke="#6366F1" stroke-width="5.5" stroke-linecap="round"/>

  <!-- INNER MESH (routing layer) -->
  <line x1="90" y1="40" x2="140" y2="90" stroke="#A78BFA" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="140" y1="90" x2="90" y2="140" stroke="#A78BFA" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="90" y1="140" x2="40" y2="90" stroke="#A78BFA" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="40" y1="90" x2="90" y2="40" stroke="#A78BFA" stroke-width="3.5" stroke-linecap="round"/>

  <!-- OUTER CROSS LINKS -->
  <line x1="40" y1="40" x2="90" y2="40" stroke="#8B5CF6" stroke-width="2.75" stroke-linecap="round"/>
  <line x1="140" y1="40" x2="140" y2="90" stroke="#8B5CF6" stroke-width="2.75" stroke-linecap="round"/>
  <line x1="140" y1="140" x2="90" y2="140" stroke="#8B5CF6" stroke-width="2.75" stroke-linecap="round"/>
  <line x1="40" y1="140" x2="40" y2="90" stroke="#8B5CF6" stroke-width="2.75" stroke-linecap="round"/>

  <!-- CROSS-DOMAIN SHORTCUTS -->
  <line x1="40" y1="40" x2="140" y2="140" stroke="#6366F1" stroke-width="2.4" stroke-linecap="round" opacity="0.88"/>
  <line x1="140" y1="40" x2="40" y2="140" stroke="#6366F1" stroke-width="2.4" stroke-linecap="round" opacity="0.88"/>

  <line x1="90" y1="40" x2="140" y2="140" stroke="#4F46E5" stroke-width="2.2" stroke-linecap="round" opacity="0.78"/>
  <line x1="90" y1="140" x2="40" y2="40" stroke="#4F46E5" stroke-width="2.2" stroke-linecap="round" opacity="0.78"/>
</svg>
